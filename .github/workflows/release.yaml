name: Release New Version

permissions:
  id-token: write
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  PROJECT_NAME: unpm-rs
  TARGET_ARCH: x86_64
  BIN_NAME_1: unpm
  BIN_NAME_2: unpx

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build binary
        run: |
          ./scripts/prepare.sh && \
          docker pull messense/rust-musl-cross:$TARGET_ARCH-musl && \
          docker run --rm -v "$(pwd)":/home/rust/src messense/rust-musl-cross:$TARGET_ARCH-musl cargo build --release && \
          tar -czf $PROJECT_NAME-$TARGET_ARCH.tar.gz -C target/$TARGET_ARCH-unknown-linux-musl/release $BIN_NAME_1 $BIN_NAME_2

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.PROJECT_NAME }}-${{ env.TARGET_ARCH }}.tar.gz

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          npx changelogithub
